<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>南京邮电大学</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: linear-gradient(45deg, #1e3a8a, #3b82f6, #8b5cf6, #ec4899, #f59e0b);
            background-size: 400% 400%;
            animation: bgFlow 15s ease infinite;
        }
        @keyframes bgFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        h1 {
            font-family: system-ui, -apple-system, sans-serif;
            font-weight: 900;
            font-size: clamp(3rem, 12vw, 10rem);
            background: linear-gradient(90deg, #ffffff, #bfdbfe, #ddd6fe, #fbcfe8, #fef3c7, #ffffff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: textShine 8s linear infinite, enterAnim 1s ease-out;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
        }
        @keyframes textShine {
            to { background-position: 200% center; }
        }
        @keyframes enterAnim {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        h1:hover, h1:active {
            transform: scale(1.05);
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.6));
        }
    </style>
</head>
<body>
    <h1>南京邮电大学</h1>
</body>
</html>
