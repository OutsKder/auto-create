<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能待办事项 (Todo List)</title>
    
    <!-- 引入炫酷的字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    
    <!-- 引入 Bootstrap 与 Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <!-- 极致美化的自定义样式 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="todo-wrapper">
    <div class="todo-container text-center">
        <h2 class="mb-4 header-title">
            <i class="bi bi-rocket-takeoff me-2"></i>探索今日待办
        </h2>

        <!-- 添加待办表单 -->
        <form id="addTodoForm" class="mb-4">
            <div class="input-group shadow-sm">
                <input type="text" class="form-control form-control-lg border-0 ps-4" id="todoTitle" placeholder="✨ 接下来想完成点什么？..." autocomplete="off" required>
                <button type="submit" class="btn btn-add px-4"><i class="bi bi-cursor-fill me-1"></i>起飞</button>
            </div>
        </form>

        <!-- 筛选和状态 -->
        <div class="d-flex justify-content-between align-items-center mb-4 px-2">
            <span id="todoCount" class="text-muted fw-bold" style="font-size: 0.95rem;">
                <i class="bi bi-activity text-primary me-1"></i>0 个任务待处理
            </span>
            <div class="btn-group btn-group-sm filter-btn-group shadow-sm" role="group">
                <input type="radio" class="btn-check filter-btn" name="btnradio" id="filterAll" value="all" checked>
                <label class="btn px-3" for="filterAll">全部</label>

                <input type="radio" class="btn-check filter-btn" name="btnradio" id="filterActive" value="active">
                <label class="btn px-3" for="filterActive">处理中</label>

                <input type="radio" class="btn-check filter-btn" name="btnradio" id="filterCompleted" value="completed">
                <label class="btn px-3" for="filterCompleted">已完成</label>
            </div>
        </div>

        <!-- 待办列表 -->
        <ul class="list-group list-group-flush align-items-start text-start mt-2" id="todoList">
            <!-- 骨架屏加载状态 -->
            <li class="list-group-item text-center border-0 text-muted py-5 w-100 bg-transparent">
                <div class="spinner-grow text-primary" role="status">
                  <span class="visually-hidden">Loading...</span>
                </div>
            </li>
        </ul>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
