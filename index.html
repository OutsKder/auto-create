<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>需求交付流程引擎 MVP</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">AI-Driven Delivery Engine</p>
          <h1>需求交付流程引擎 MVP</h1>
          <p class="subtitle">
            用一个本地可运行的工作台，验证“需求 -> 方案 -> 编码 -> 测试 -> 评审 -> 交付”的 AI
            驱动闭环。
          </p>
        </div>
        <div class="topbar-actions">
          <button id="seedDataBtn" class="ghost-btn">恢复示例数据</button>
          <button id="clearDataBtn" class="danger-btn">清空本地数据</button>
        </div>
      </header>

      <div class="workspace">
        <aside class="sidebar panel">
          <section class="panel-section">
            <div class="section-heading">
              <h2>新建需求</h2>
              <span class="hint">创建后自动进入流程</span>
            </div>

            <form id="requirementForm" class="form-grid">
              <label>
                <span>需求标题</span>
                <input name="title" type="text" maxlength="80" required placeholder="例如：新增审批通知汇总能力" />
              </label>

              <label>
                <span>需求背景</span>
                <textarea
                  name="background"
                  rows="3"
                  maxlength="300"
                  required
                  placeholder="当前流程痛点、用户场景、业务背景"
                ></textarea>
              </label>

              <label>
                <span>目标</span>
                <textarea
                  name="goal"
                  rows="3"
                  maxlength="300"
                  required
                  placeholder="希望最终达成什么结果"
                ></textarea>
              </label>

              <label>
                <span>约束条件</span>
                <textarea
                  name="constraints"
                  rows="2"
                  maxlength="220"
                  placeholder="时间限制、兼容性要求、依赖条件"
                ></textarea>
              </label>

              <div class="inline-fields">
                <label>
                  <span>优先级</span>
                  <select name="priority">
                    <option value="high">高</option>
                    <option value="medium" selected>中</option>
                    <option value="low">低</option>
                  </select>
                </label>

                <label>
                  <span>负责人</span>
                  <input name="owner" type="text" maxlength="30" placeholder="例如：产品经理A" />
                </label>
              </div>

              <button type="submit" class="primary-btn">创建并启动流程</button>
            </form>
          </section>

          <section class="panel-section">
            <div class="section-heading">
              <h2>需求列表</h2>
              <span id="listCount" class="hint"></span>
            </div>

            <div class="filters">
              <input id="searchInput" type="search" placeholder="搜索标题或负责人" />
              <select id="statusFilter">
                <option value="all">全部状态</option>
                <option value="draft">草稿</option>
                <option value="in_progress">进行中</option>
                <option value="blocked">待处理</option>
                <option value="completed">已完成</option>
              </select>
            </div>

            <div id="requirementList" class="requirement-list"></div>
          </section>
        </aside>

        <main class="main-content">
          <section id="overviewPanel" class="panel"></section>
          <section id="pipelinePanel" class="panel"></section>
        </main>

        <aside class="rightbar">
          <section id="summaryPanel" class="panel"></section>
          <section id="riskPanel" class="panel"></section>
          <section id="logPanel" class="panel"></section>
        </aside>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
