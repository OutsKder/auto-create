spring:
  application:
    name: student-management-system
  datasource:
    url: jdbc:h2:mem:smsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: sms-secret-key-2023-change-me-in-production
  expiration: 86400000 # 24 hours

server:
  port: 8080