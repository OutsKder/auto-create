# LLM 配置文件
# 支持多个服务商的配置

doubao:
  provider: doubao
  model: ep-20260423223020-fxwrn # 豆包 2.0 模型 ID
  api_key: ark-ed75ee35-931d-4978-bdd8-4f0a9fa4e230-5f52b
  base_url: https://ark.cn-beijing.volces.com/api/v3
  temperature: 0.7
  max_tokens: 4096
  timeout: 120
  streaming: true
  retry_count: 3

# 备用配置 - 通义千问
qwen:
  provider: qwen
  model: qwen-max
  api_key: ${DASHSCOPE_API_KEY} # 从环境变量读取
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  temperature: 0.7
  max_tokens: 4096
  timeout: 120
  streaming: true
  retry_count: 3

# 备用配置 - OpenAI
openai:
  provider: openai
  model: gpt-4
  api_key: ${OPENAI_API_KEY} # 从环境变量读取
  base_url: https://api.openai.com/v1
  temperature: 0.7
  max_tokens: 4096
  timeout: 120
  streaming: true
  retry_count: 3
